<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <title>AI Fellowships 2026</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>
<body>
  <header>
    <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Toggle color theme">☾</button>
    <h1>AI Fellowships 2026</h1>
    <p>Community-maintained list of AI fellowships, residencies &amp; funded programs.</p>
  </header>
  <section class="controls">
    <input id="search" type="search" placeholder="Search name, org, description…" autocomplete="off">
    <select id="category" aria-label="Filter by category"></select>
    <select id="status" aria-label="Filter by status">
      <option value="">All statuses</option>
      <option value="open">Open</option>
      <option value="upcoming">Upcoming</option>
      <option value="rolling">Rolling</option>
      <option value="closed">Closed</option>
    </select>
    <select id="sort" aria-label="Sort">
      <option value="deadline">Sort: Deadline</option>
      <option value="name">Sort: Name</option>
    </select>
  </section>
  <p id="count" class="count"></p>
  <main id="list" class="list"></main>
  <footer>
    <p>Generated from <code>data/fellowships.yaml</code>. Verify deadlines on official links.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
