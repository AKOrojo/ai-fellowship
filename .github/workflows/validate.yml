name: Validate
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths: ["data/**", "scripts/**", "tests/**", ".github/workflows/**"]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39   # astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Validate data
        run: uv run python scripts/validate.py
      - name: Run tests
        run: uv run pytest -q
