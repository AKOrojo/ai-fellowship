name: Validate
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths: ["data/**", "scripts/**", "tests/**", ".github/workflows/**"]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # actions/checkout@v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990   # astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Validate data
        run: uv run python scripts/validate.py
      - name: Run tests
        run: uv run pytest -q
