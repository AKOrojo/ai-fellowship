name: Validate
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths: ["data/**", "scripts/**", "tests/**", ".github/workflows/**"]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # actions/checkout@v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e   # astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Validate data
        run: uv run python scripts/validate.py
      - name: Run tests
        run: uv run pytest -q
