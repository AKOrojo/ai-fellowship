name: Build and deploy
on:
  push:
    branches: [main]
    paths: ["data/**", "scripts/**", "site/**", "README.md"]
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit regenerated README
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e   # astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Regenerate README + data.json
        run: uv run python scripts/generate.py
      - name: Commit README if changed
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: regenerate README table [skip ci]"
            git push || echo "::warning::README push rejected (branch protection?). Pages still deploys current data."
          fi
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b   # actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa   # actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e   # actions/deploy-pages@v4
