name: Issue to PR
on:
  issues:
    types: [labeled]
permissions:
  contents: read
jobs:
  convert:
    if: github.event.label.name == 'fellowship-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # actions/checkout@v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e   # astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Build entry from issue (untrusted input via env only)
        id: build
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if uv run python scripts/issue_to_entry.py; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment failure back on the issue
        if: steps.build.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue comment "$ISSUE_NUMBER" --body "Automated validation failed for this submission. A maintainer will take a look, or please edit the issue to fix the fields."
      - name: Open draft PR
        if: steps.build.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          branch="submission/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/fellowships.yaml
          git commit -m "data: add fellowship from issue #${ISSUE_NUMBER}"
          git push --set-upstream origin "$branch"
          gh pr create --draft --base main --head "$branch" \
            --title "Add fellowship from issue #${ISSUE_NUMBER}" \
            --body "Auto-generated from issue #${ISSUE_NUMBER}. Validated by CI. Requires maintainer review before merge."
