name: Maintenance
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # actions/checkout@v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990   # astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Validate (catch drift)
        run: uv run python scripts/validate.py
      - name: Build maintenance report
        run: uv run python scripts/maintenance_report.py > report.md
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Weekly maintenance report"
          gh label create maintenance --color ededed --description "Automated weekly maintenance reports" --force
          existing=$(gh issue list --label maintenance --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file report.md
          else
            gh issue create --title "$title" --label maintenance --body-file report.md
          fi
